server {
  listen 80;
  server_name stroy-kontrol-ufa.ru www.stroy-kontrol-ufa.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://stroy-kontrol-ufa.ru$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name stroy-kontrol-ufa.ru;

  ssl_certificate /etc/letsencrypt/live/stroy-kontrol-ufa.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/stroy-kontrol-ufa.ru/privkey.pem;

  location / {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

server {
  listen 443 ssl http2;
  server_name www.stroy-kontrol-ufa.ru;

  ssl_certificate /etc/letsencrypt/live/stroy-kontrol-ufa.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/stroy-kontrol-ufa.ru/privkey.pem;

  return 301 https://stroy-kontrol-ufa.ru$request_uri;
}
